<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Type Clone - Terminal Velocity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .menu-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 20, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid #334155;
            text-align: center;
            pointer-events: auto;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3b82f6;
        }

        #custom-text-area {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            width: 100%;
            height: 100px;
            margin: 1rem 0;
            padding: 0.5rem;
            border-radius: 0.25rem;
            resize: none;
            font-size: 0.8rem;
        }

        /* Mobile specific hidden input to trigger keyboard */
        #mobile-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            top: -100px;
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
            pointer-events: auto;
        }

        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
            .stat-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Hidden input for mobile keyboard support -->
    <input type="text" id="mobile-input" autocomplete="off" autocapitalize="off" spellcheck="false">

    <div class="ui-overlay">
        <!-- HUD -->
        <div id="hud" class="flex justify-between p-4 md:p-6 opacity-0 transition-opacity duration-500">
            <div class="flex flex-col">
                <span class="stat-label">Score</span>
                <span id="score-val" class="stat-value">0</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="stat-label">Wave</span>
                <span id="wave-val" class="stat-value">1</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="stat-label">EMP</span>
                <div id="emp-container" class="flex gap-1 mt-1">
                    <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
                    <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="menu-screen">
            <h1 class="text-3xl md:text-4xl font-bold mb-2 text-blue-500">TYPER-ONE 2.0</h1>
            <p class="text-slate-400 mb-6 italic">Visual Overhaul & Mobile Ready</p>
            
            <div class="text-left mb-6">
                <label class="stat-label">Custom Scan / Source Text</label>
                <textarea id="custom-text-area" placeholder="Paste text here to generate custom enemies..."></textarea>
            </div>

            <button onclick="startGame()" class="btn w-full">Initiate Launch</button>
            <p class="mt-4 text-xs text-slate-500 hidden md:block">TYPE words to shoot. SPACE for EMP.</p>
            <p class="mt-4 text-xs text-slate-500 md:hidden">Tapping the screen will focus your keyboard.</p>
        </div>

        <!-- Mobile Controls (Only visible on small screens) -->
        <div class="mobile-controls">
            <button onclick="triggerEMP()" class="btn bg-red-600 hover:bg-red-700 !m-0 !py-4 px-8">EMP</button>
            <button onclick="focusKeyboard()" class="btn bg-slate-700 hover:bg-slate-600 !m-0 !py-4 px-8">KEYBOARD</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="menu-screen hidden">
            <h2 class="text-3xl font-bold mb-2 text-red-500">SYSTEM CRITICAL</h2>
            <p class="text-slate-400 mb-6">Visual sensors offline.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                <div class="bg-slate-900 p-3 rounded border border-slate-800">
                    <div class="stat-label">Score</div>
                    <div id="final-score" class="font-bold">0</div>
                </div>
                <div class="bg-slate-900 p-3 rounded border border-slate-800">
                    <div class="stat-label">Waves</div>
                    <div id="final-waves" class="font-bold">0</div>
                </div>
                <div class="bg-slate-900 p-3 rounded border border-slate-800">
                    <div class="stat-label">Accuracy</div>
                    <div id="final-accuracy" class="font-bold">0%</div>
                </div>
                <div class="bg-slate-900 p-3 rounded border border-slate-800">
                    <div class="stat-label">WPM</div>
                    <div id="final-wpm" class="font-bold">0</div>
                </div>
            </div>

            <button onclick="resetGame()" class="btn w-full">Re-Initialize</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mobileInput = document.getElementById('mobile-input');
        
        const vastWords = [
            "algorithm", "bandwidth", "ciphertext", "database", "encryption", "firewall", "gateway", "hardware", "interface", "javascript", "keyboard", "language", "middleware", "network", "operating", "protocol", "quantum", "runtime", "software", "terminal", "username", "virtual", "workflow", "xml", "yield", "zero-day",
            "asteroid", "blackhole", "comet", "darkmatter", "exoplanet", "fusion", "galaxy", "horizon", "interstellar", "jupiter", "kepler", "lightspeed", "meteor", "nebula", "orbit", "pulsar", "quasar", "relativity", "supernova", "telescope", "universe", "vacuum", "wormhole", "x-ray", "yotta", "zenith",
            "accelerate", "boundary", "circuit", "diffraction", "entropy", "frequency", "gravity", "hologram", "inertia", "junction", "kinetic", "luminescence", "magnetic", "neutrino", "oscillation", "photon", "quark", "radiation", "spectrum", "trajectory", "ultraviolet", "velocity", "wavelength", "xenon", "yield", "zodiac"
        ];
        
        let words = [...vastWords];
        let gameState = 'START';
        let score = 0;
        let wave = 1;
        let emps = 3;
        let enemies = [];
        let particles = [];
        let bullets = [];
        let activeEnemy = null;
        let keystrokes = 0;
        let correctKeystrokes = 0;
        let startTime = 0;
        let lastWaveTime = 0;
        let spawnRate = 3000;
        let lastSpawnTime = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Handle Mobile Keyboard Interaction
        function focusKeyboard() {
            mobileInput.focus();
        }

        mobileInput.addEventListener('input', (e) => {
            const char = e.data;
            if (char) {
                handleTyping(char.toLowerCase());
                mobileInput.value = ''; // Reset for next char
            }
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Enemy {
            constructor(text, x, speed) {
                this.text = text;
                this.typed = "";
                this.x = x;
                this.y = -50;
                this.speed = speed;
                this.color = '#e2e8f0';
                this.highlightColor = '#3b82f6';
                this.fontSize = 18;
                this.angle = 0;
            }

            update() {
                this.y += this.speed;
                this.angle = Math.sin(Date.now() / 500) * 0.1; // Gentle sway
                if (this.y > canvas.height - 120) {
                    endGame();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // --- Graphical Enemy Ship Design ---
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.typed.length > 0 ? '#3b82f6' : '#ef4444';
                
                // Main Chassis
                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.moveTo(0, 10);
                ctx.lineTo(-20, -10);
                ctx.lineTo(-10, -20);
                ctx.lineTo(10, -20);
                ctx.lineTo(20, -10);
                ctx.closePath();
                ctx.fill();
                
                // Wings/Engines
                ctx.strokeStyle = this.typed.length > 0 ? '#3b82f6' : '#64748b';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Thrusters
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(-12, -22, 5, 3);
                ctx.fillRect(7, -22, 5, 3);

                ctx.restore();

                // Text Rendering
                ctx.font = `bold ${this.fontSize}px 'JetBrains Mono'`;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;
                
                // Full text shadow
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillText(this.text, this.x + 1, this.y + 41);

                // Background word
                ctx.fillStyle = this.color;
                ctx.fillText(this.text, this.x, this.y + 40);
                
                // Typed highlight
                if (this.typed.length > 0) {
                    ctx.fillStyle = this.highlightColor;
                    const fullWidth = ctx.measureText(this.text).width;
                    const typedWidth = ctx.measureText(this.typed).width;
                    const startX = this.x - (fullWidth / 2);
                    ctx.textAlign = 'left';
                    ctx.fillText(this.typed, startX, this.y + 40);
                }
            }
        }

        class Bullet {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.tx = tx;
                this.ty = ty;
                this.speed = 25;
                const angle = Math.atan2(ty - sy, tx - sx);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.dead = false;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (Math.abs(this.x - this.tx) < 25 && Math.abs(this.y - this.ty) < 25) {
                    this.dead = true;
                }
            }
            draw() {
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 0.4, this.y - this.vy * 0.4);
                ctx.stroke();
            }
        }

        function createExplosion(x, y, color = '#3b82f6') {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnEnemy() {
            const text = words[Math.floor(Math.random() * words.length)];
            const x = Math.random() * (canvas.width - 160) + 80;
            const speed = 0.5 + (wave * 0.12);
            enemies.push(new Enemy(text, x, speed));
        }

        function startGame() {
            const customText = document.getElementById('custom-text-area').value.trim();
            if (customText) {
                words = customText.split(/\s+/).filter(w => w.length > 1).map(w => w.toLowerCase().replace(/[^a-z]/g, ''));
                if (words.length < 5) words = [...vastWords, ...words];
            } else {
                words = [...vastWords];
            }

            gameState = 'PLAYING';
            score = 0;
            wave = 1;
            emps = 3;
            enemies = [];
            particles = [];
            bullets = [];
            activeEnemy = null;
            keystrokes = 0;
            correctKeystrokes = 0;
            startTime = Date.now();
            lastWaveTime = Date.now();
            spawnRate = 3000;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').classList.remove('opacity-0');
            updateHUD();
            focusKeyboard();
        }

        function endGame() {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-waves').innerText = wave;
            
            const acc = keystrokes > 0 ? Math.round((correctKeystrokes / keystrokes) * 100) : 0;
            document.getElementById('final-accuracy').innerText = acc + "%";
            
            const timeInMinutes = (Date.now() - startTime) / 60000;
            const wpm = Math.round((correctKeystrokes / 5) / timeInMinutes) || 0;
            document.getElementById('final-wpm').innerText = wpm;
            
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 500);
        }

        function resetGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function updateHUD() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('wave-val').innerText = wave;
            const container = document.getElementById('emp-container');
            container.innerHTML = '';
            for(let i=0; i<emps; i++) {
                const dot = document.createElement('div');
                dot.className = "w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]";
                container.appendChild(dot);
            }
        }

        function triggerEMP() {
            if (emps <= 0 || gameState !== 'PLAYING') return;
            emps--;
            createExplosion(canvas.width/2, canvas.height/2, '#ffffff');
            enemies.forEach(e => {
                createExplosion(e.x, e.y, '#ef4444');
                score += 15;
            });
            enemies = [];
            activeEnemy = null;
            updateHUD();
            
            // Visual flash
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            focusKeyboard();
        }

        function handleTyping(char) {
            if (gameState !== 'PLAYING') return;
            keystrokes++;

            if (activeEnemy) {
                const targetChar = activeEnemy.text[activeEnemy.typed.length];
                if (char === targetChar) {
                    correctKeystrokes++;
                    activeEnemy.typed += char;
                    bullets.push(new Bullet(canvas.width/2, canvas.height - 80, activeEnemy.x, activeEnemy.y));
                    
                    if (activeEnemy.typed === activeEnemy.text) {
                        createExplosion(activeEnemy.x, activeEnemy.y);
                        score += activeEnemy.text.length * 10;
                        enemies = enemies.filter(item => item !== activeEnemy);
                        activeEnemy = null;
                        updateHUD();
                    }
                } else {
                    canvas.classList.add('shake');
                    setTimeout(() => canvas.classList.remove('shake'), 100);
                }
            } else {
                const potentialTarget = enemies.find(en => en.text[0] === char);
                if (potentialTarget) {
                    correctKeystrokes++;
                    activeEnemy = potentialTarget;
                    activeEnemy.typed = char;
                    bullets.push(new Bullet(canvas.width/2, canvas.height - 80, activeEnemy.x, activeEnemy.y));
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                triggerEMP();
            } else if (e.key.length === 1) {
                handleTyping(e.key.toLowerCase());
            }
        });

        // Touch the screen to refocus keyboard on mobile
        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'PLAYING') focusKeyboard();
        });

        function drawPlayerShip() {
            const cx = canvas.width / 2;
            const cy = canvas.height - 70;
            
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#3b82f6';
            
            // Engines glow
            const flicker = Math.random() * 5;
            ctx.fillStyle = '#60a5fa';
            ctx.beginPath();
            ctx.arc(cx - 10, cy + 30, 8 + flicker, 0, Math.PI * 2);
            ctx.arc(cx + 10, cy + 30, 8 + flicker, 0, Math.PI * 2);
            ctx.fill();

            // Ship Body
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(cx, cy - 30); // Nose
            ctx.lineTo(cx - 15, cy + 10); // Wing left
            ctx.lineTo(cx - 25, cy + 25); // Wing left tip
            ctx.lineTo(cx - 10, cy + 20); // Back left
            ctx.lineTo(cx + 10, cy + 20); // Back right
            ctx.lineTo(cx + 25, cy + 25); // Wing right tip
            ctx.lineTo(cx + 15, cy + 10); // Wing right
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 5, 5, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function animate() {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background Stars (Speed lines)
            ctx.fillStyle = '#1e293b';
            for(let i=0; i<40; i++) {
                const x = (Math.sin(i * 543.21) * 0.5 + 0.5) * canvas.width;
                const y = ((Date.now() * 0.2 + i * 200) % canvas.height);
                ctx.fillRect(x, y, 1, 10);
            }

            if (gameState === 'PLAYING') {
                const now = Date.now();
                
                if (now - lastWaveTime > 15000) {
                    wave++;
                    spawnRate = Math.max(700, 3000 - (wave * 250));
                    lastWaveTime = now;
                    updateHUD();
                }

                if (now - lastSpawnTime > spawnRate) {
                    spawnEnemy();
                    lastSpawnTime = now;
                }

                bullets.forEach((b, index) => {
                    b.update();
                    b.draw();
                    if (b.dead) bullets.splice(index, 1);
                });

                enemies.forEach(e => {
                    e.update();
                    e.draw();
                });

                drawPlayerShip();
            }

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
